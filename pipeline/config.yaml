# =============================================================================
# AI-SSD Project – Unified Pipeline Configuration
# =============================================================================
# Single source of truth for Phases 1-4 and the master pipeline orchestrator.
# Phase 0 (cve_aggregator) uses its own YAML (glibc_config.yaml / aggregator_config.yaml)
# but shares the LLM and path settings defined here where applicable.
# =============================================================================

# =============================================================================
# Global Settings
# =============================================================================

# Phase 0 configuration file (relative to base directory)
phase0_config: "cve_aggregator/glibc_config.yaml"

# Per-phase process timeouts (seconds) – used by the master pipeline executor
phase_timeouts:
  0: 7200       # Phase 0: Data aggregation (API calls + git operations)
  1: 3600       # Phase 1: Vulnerability reproduction (Docker builds)
  2: 10800      # Phase 2: Patch generation (LLM API calls)
  3: 7200       # Phase 3: Patch validation (Docker builds + PoC + SAST)
  4: 600        # Phase 4: Reporting

# Docker-level timeouts (seconds) – used inside individual phases
build_timeout: 3600     # Docker image build timeout
run_timeout: 300        # Container run / PoC execution timeout

# Docker resource settings
docker:
  memory_limit: "2g"
  cpu_limit: 1
  network_disabled: true

# =============================================================================
# Directory Layout (relative to base directory)
# =============================================================================

paths:
  csv_file: "documentation/file-function.csv"
  exploits_dir: "exploits"
  docker_builds: "docker_builds"
  results: "results"
  logs: "logs"
  patches: "patches"
  validation_results: "validation_results"
  reports: "reports"
  manual_supervision: "manual_supervision"
  documentation: "documentation"

# =============================================================================
# OS / Ubuntu Mapping
# =============================================================================

# CVE-year → Ubuntu base image for Docker builds (Phase 1 + Phase 3)
os_mapping:
  "2012": "ubuntu:14.04"
  "2013": "ubuntu:14.04"
  "2014": "ubuntu:14.04"
  "2015": "ubuntu:16.04"
  "2016": "ubuntu:16.04"
  "2017": "ubuntu:18.04"
  "2018": "ubuntu:18.04"
  default: "ubuntu:16.04"

# Vulnerability detection patterns (Phase 1)
detection_patterns:
  exit_codes:
    - 139  # SIGSEGV
    - 134  # SIGABRT
  log_patterns:
    - "stack smashing"
    - "overflow"
    - "corrupted"
    - "double free"
    - "buffer overflow"

# =============================================================================
# LLM Settings (Phase 2 patch generation + master pipeline health check)
# =============================================================================

llm:
  # -------------------------------------------------------------------------
  # Backend provider: "ollama" (local GPU server) or "openai" (OpenAI API)
  # -------------------------------------------------------------------------
  provider: "ollama"

  # -------------------------------------------------------------------------
  # Ollama settings (used only when provider: "ollama")
  # -------------------------------------------------------------------------

  # Ollama-compatible chat API endpoint
  endpoint: "http://10.3.2.171:80/api/chat"

  # Models to iterate through for patch generation
  models:
    - "qwen2.5-coder:1.5b"
    - "qwen2.5-coder:7b"
    - "qwen2.5:1.5b"
    - "qwen2.5:7b"

  # Ollama context window (avoids silent 4096 truncation)
  num_ctx: 32768

  # Wait for GPU before generation (seconds, 0 = skip)
  gpu_wait_timeout: 120

  # Health check settings (used by master pipeline before Phase 2)
  health_check:
    timeout: 60           # Health-check request timeout (seconds)
    num_predict: 5        # Minimal token count for the probe request

  # -------------------------------------------------------------------------
  # OpenAI settings (used only when provider: "openai")
  # -------------------------------------------------------------------------

  # Model to use. gpt-4.1-mini is a non-reasoning model with a 10 M token/day
  # free tier – well suited for code generation tasks.
  openai_model: "gpt-4.1-mini"

  # API key. The OPENAI_API_KEY environment variable takes precedence.
  # If neither is set the pipeline will raise an error at startup.
  # Do NOT commit a real key here; prefer the environment variable.
  openai_api_key: ""

  # -------------------------------------------------------------------------
  # Shared request settings (apply to both providers)
  # -------------------------------------------------------------------------
  timeout: 600            # Per-request timeout (seconds)
  retry_attempts: 2       # Retry attempts on failure
  retry_delay: 5          # Delay between retries (seconds)

  # Generation parameters
  temperature: 0.2        # Lower = more deterministic
  max_tokens: 8192        # Maximum tokens in response

# =============================================================================
# Phase 3: Validation Settings
# =============================================================================

validation:
  auto_validate: false
  validate_timeout: 600       # Per-patch validation timeout (seconds)
  build_timeout: 3600         # Validation Docker build timeout (seconds)
  poc_timeout: 300            # PoC execution timeout (seconds)

  # SAST Configuration
  sast:
    enabled: true

    cppcheck:
      enabled: true
      enable_checks: "all"
      suppress: []
      max_errors: 0
      max_warnings: 10

    flawfinder:
      enabled: true
      min_level: 1
      max_high_severity: 0
      max_total_hits: 50

  # Baseline comparison
  baseline:
    compare_to_baseline: true
    tolerance_errors: 0
    tolerance_warnings: 5

  # Cleanup
  cleanup:
    remove_images: true
    remove_build_dirs: false
    keep_failure_logs: true

# =============================================================================
# Iterative Feedback Loop (Self-Healing) Settings
# =============================================================================

feedback_loop:
  enabled: true
  max_retries: 3
  timeout: 7200               # Total feedback-loop timeout (seconds)

  retry_on:
    poc_still_works: true
    sast_failed: true
    build_error: false

  context_injection:
    include_poc_output: true
    max_poc_output_length: 1500
    include_sast_findings: true
    max_sast_findings: 5

  output:
    save_retry_artifacts: true
    keep_validation_history: true
    create_success_marker: true

# =============================================================================
# Manual Verification (Phase 0 post-processing)
# =============================================================================

manual_verification:
  timeout: 1800               # Wait for manual review (seconds)
  poll_interval: 30           # Poll frequency (seconds)

# =============================================================================
# CVE-specific file mappings (Phase 3 Dockerfile generation)
# =============================================================================

cve_mappings:
  CVE-2012-3480:
    glibc_file: "stdlib/strtod_l.c"
    patch_file: "strtod_l.c"

  CVE-2014-5119:
    glibc_file: "iconv/gconv_trans.c"
    patch_file: "gconv_trans.c"

  CVE-2015-7547:
    glibc_file: "resolv/res_send.c"
    patch_file: "res_send.c"
