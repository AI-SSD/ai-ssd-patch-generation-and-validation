# =============================================================================
# CVE Aggregator Pipeline – Configuration
# =============================================================================
# This is a PROJECT-AGNOSTIC configuration template.
# Customise the values below for your target software project.
# =============================================================================

# ---------------------------------------------------------------------------
# Project identity (used in dataset names, logging, etc.)
# ---------------------------------------------------------------------------
project:
  name: "my-project"                     # Short slug (no spaces)
  display_name: "My Project"             # Human-readable name
  description: "CVE dataset for My Project"

# ---------------------------------------------------------------------------
# Pipeline behaviour
# ---------------------------------------------------------------------------
pipeline:
  abort_on_error: true                   # Stop on first module failure?
  # Modules to skip entirely (class names):
  #   CVEFetcher, CommitDiscovery, PoCMapper, DataAggregator,
  #   SyntaxValidator, OutputGenerator
  skip_modules: []

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level: "INFO"                          # DEBUG | INFO | WARNING | ERROR
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  file: "logs/cve_aggregator.log"        # Set to null to disable file logging

# ---------------------------------------------------------------------------
# Module 1: CVE Fetching & Enrichment
# ---------------------------------------------------------------------------
cve_fetcher:
  # NVD API key – get one at https://nvd.nist.gov/developers/request-an-api-key
  nvd_api_key: ""                        # Leave empty for unauthenticated (slow)

  # Keywords used for NVD keyword search.
  # These are sent as ``keywordSearch`` to the NVD 2.0 API.
  keywords:
    - "my-project"                       # <-- Replace with your project keywords

  # Strong keywords that MUST appear in a CVE description for it to be
  # considered relevant.  Used for deduplication filtering.
  strong_keywords:
    - "my-project"

  # If the description contains ONLY a weak match (e.g. a generic library
  # name), the presence of any of these strings causes the entry to be
  # rejected.  Useful to exclude look-alike projects.
  non_target_indicators: []
  #   - "SomeOtherProject"
  #   - "NotMyLibrary"

  # Optional hardening knobs (recommended for projects with common/generic names):
  # - strict_target_matching: require at least one strong keyword in CVE description
  # - require_project_cpe_match: require a project alias to appear in a CVE CPE entry
  strict_target_matching: false
  require_project_cpe_match: false
  project_cpe_aliases: []
  #   - "my-project"
  #   - "my_project"

  # Optionally enrich each CVE with CVE.org data (slower).
  enrich_with_cve_org: false
  cve_org_delay: 1.0                     # Seconds between CVE.org requests

# ---------------------------------------------------------------------------
# Module 2: Commit Discovery
# ---------------------------------------------------------------------------
commit_discovery:
  # Remote URL of the source repository (will be cloned if not present)
  repo_url: "https://github.com/example/my-project.git"

  # Local path to the cloned repository (relative to CWD or absolute)
  repo_local_path: "./source_repo"

  # Pull latest changes before searching?
  auto_update: true

  # Additional git-grep patterns to try when searching for fix commits.
  # The pipeline always searches for CVE-ID and CVE-ID-without-dashes.
  # BZ fallback and unscoped extra patterns are configurable below.
  extra_grep_patterns: []
  # Use placeholders to scope a pattern to the current CVE:
  #   - "Bug: {cve}"
  #   - "BZ#\s*{cve_num}"
  #   - "Fixes #"
  #   - "Bug:"

  # Optional safety knobs for commit matching:
  # - enable_bz_fallback: tries bug-tracker numeric matching (can create false positives)
  # - allow_unscoped_extra_patterns: if false, plain patterns without {cve}/{cve_num} are ignored
  enable_bz_fallback: true
  allow_unscoped_extra_patterns: false

  # File extensions considered as "source code" for content extraction
  source_extensions:
    - ".c"
    - ".h"

# ---------------------------------------------------------------------------
# Module 3: PoC Mapping & Extraction (ExploitDB)
# ---------------------------------------------------------------------------
poc_mapper:
  # Local path to the ExploitDB git repository
  exploitdb_path: "./exploit-database"

  # Remote URL (for auto-clone)
  exploitdb_remote_url: "https://gitlab.com/exploit-database/exploitdb.git"

  # Pull latest ExploitDB data before mapping?
  auto_update: true

  # Deep search: grep exploit file *contents* for CVE IDs (slower but thorough)
  deep_search: false

  # Extract full source code from matched exploit files?
  extract_content: true

  # Reverse search: scan ExploitDB titles/contents for your project's
  # keywords to discover CVEs not returned by NVD keyword search.
  reverse_search: true
  enable_reverse_content_grep: true

  # Keywords for the reverse search (defaults to cve_fetcher.strong_keywords)
  # strong_keywords: []

  # Only include verified exploits from ExploitDB?
  require_verified: true

  # Indicators that an exploit mentioning your project is actually about
  # something else (same idea as cve_fetcher.non_target_indicators).
  non_target_indicators: []

  # Keywords to grep inside exploit file contents
  # content_search_keywords: []

# ---------------------------------------------------------------------------
# Module 4: Data Aggregator
# ---------------------------------------------------------------------------
data_aggregator:
  # Path to the global (all-CVEs) JSON dataset
  global_json_path: "cve_poc_map.json"

  # When true, remove CVEs from the persisted dataset that are not present
  # in the current run's raw_cves set.
  prune_missing_cves: false

# ---------------------------------------------------------------------------
# Module 5: Syntax Validation
# ---------------------------------------------------------------------------
syntax_validator:
  # Directory where invalid PoC files are copied for manual review
  manual_supervision_dir: "manual_supervision"

  # Path for the JSON validation report
  report_path: "syntax_validation_report.json"

# ---------------------------------------------------------------------------
# Module 6: LLM PoC Repair
# ---------------------------------------------------------------------------
# Attempts to auto-fix invalid PoCs using an LLM before flagging for manual
# review.  Requires an Ollama-compatible API endpoint.
poc_repair:
  # Ollama-compatible chat API endpoint
  api_endpoint: "http://10.3.2.171:80/api/chat"

  # LLM model to use for repairs (must be available on the Ollama server)
  model: "qwen2.5-coder:7b"

  # Maximum number of repair attempts per PoC before flagging for manual review
  max_repair_attempts: 3

  # Timeout for each LLM API call (seconds)
  api_timeout: 120

  # Ollama context window override passed as options.num_ctx.
  # 0 = use the server default.
  num_ctx: 0

  # Maximum characters of PoC source code included in the prompt.
  # 0 = no truncation.
  max_poc_chars: 0

  # Sampling temperature for the LLM
  temperature: 0.2

  # Output paths
  report_path: "poc_repair_report.json"
  manual_review_queue_path: "manual_review_queue.json"

# ---------------------------------------------------------------------------
# Module 7: Output Generation
# ---------------------------------------------------------------------------
output:
  # JSON output paths
  global_json_path: "cve_poc_map.json"
  filtered_json_path: "cve_poc_map_filtered.json"

  # CSV output
  csv_path: "cve_poc_complete.csv"

  # Directory for saving individual PoC exploit files
  poc_dir: "exploits"

  # Filter controls for the "filtered" dataset:
  # - filtered_require_commit: keep only CVEs with discovered fix commits
  # - filtered_require_poc: keep only CVEs with at least one mapped PoC
  # - filtered_require_verified_poc: require at least one PoC flagged as
  #   verified in ExploitDB (mirrors poc_mapper.require_verified for output)
  filtered_require_commit: true
  filtered_require_poc: true
  filtered_require_verified_poc: true

  # Export PoC rows/files even when commit discovery failed.
  # Useful for PoC inventory workflows; disable for strict patch-pipeline-only mode.
  allow_poc_without_commit: false

  # CSV column names (order matters)
  csv_fields:
    - "CVE"
    - "V_COMMIT"
    - "FilePath"
    - "F_NAME"
    - "UNIT_TYPE"
    - "V_FILE"
    - "V_FUNCTION"
    - "CVE_Description"
    - "CWE"
    - "CWE_Description"
    - "project_version"
    - "project_version_normalized"
    - "ubuntu_version"
    - "poc_index"
    - "poc_path"
    - "poc_language"
    - "manual_review_required"
    - "manual_verified"


# =============================================================================
# EXAMPLE: glibc-specific configuration
# =============================================================================
# To use this pipeline for glibc, replace the sections above with:
#
# project:
#   name: "glibc"
#   display_name: "GNU C Library"
#
# cve_fetcher:
#   nvd_api_key: "YOUR_KEY"
#   keywords: ["glibc", "GNU C Library", "eglibc"]
#   strong_keywords: ["glibc", "GNU C Library", "GNU libc", "eglibc"]
#   non_target_indicators:
#     - "NetBSD"
#     - "FreeBSD"
#     - "musl"
#     - "dietlibc"
#     - "uClibc"
#     - "Bionic"
#
# commit_discovery:
#   repo_url: "https://github.com/bminor/glibc.git"
#   repo_local_path: "./glibc"
#   source_extensions: [".c", ".h"]
#
# poc_mapper:
#   exploitdb_path: "./exploit-database"
#   reverse_search: true
#   require_verified: true
# =============================================================================
