# =============================================================================
# CVE Aggregator Pipeline – Apache Tomcat Configuration
# =============================================================================
# Production configuration for the Apache Tomcat project.
# Pass to the pipeline with:
#   python3 pipeline.py --phases 0 --phase0-config cve_aggregator/tomcat_config.yaml
# =============================================================================

# ---------------------------------------------------------------------------
# Project identity (used in dataset names, logging, etc.)
# ---------------------------------------------------------------------------
project:
  name: "tomcat"
  display_name: "Apache Tomcat"
  description: "CVE and PoC dataset for Apache Tomcat"

# ---------------------------------------------------------------------------
# Pipeline behaviour
# ---------------------------------------------------------------------------
pipeline:
  abort_on_error: false          # Continue even if one module fails
  skip_modules: []

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level: "INFO"                  # DEBUG | INFO | WARNING | ERROR
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  file: "logs/tomcat_cve_aggregator.log"

# ---------------------------------------------------------------------------
# Module 1: CVE Fetching & Enrichment
# ---------------------------------------------------------------------------
cve_fetcher:
  # NVD API key – get one at https://nvd.nist.gov/developers/request-an-api-key
  nvd_api_key: "043bad81-616b-445a-8e79-96e87cc96c66"

  # Keywords used for NVD keyword search.
  # These are sent as ``keywordSearch`` to the NVD 2.0 API.
  keywords:
    - "Apache Tomcat"
    - "tomcat"

  # Strong keywords that MUST appear in a CVE description for it to be
  # considered relevant.  Used for deduplication filtering.
  strong_keywords:
    - "Apache Tomcat"
    - "apache tomcat"
    - "Tomcat"

  # If the description contains ONLY a weak match (e.g. a generic name),
  # the presence of any of these strings causes the entry to be rejected.
  # Useful to exclude look-alike or co-mentioned projects.
  non_target_indicators:
    # Other Apache projects that may co-appear in CVE descriptions
    - "Apache HTTP Server"
    - "Apache httpd"
    - "Apache Struts"
    - "Apache ActiveMQ"
    - "Apache Kafka"
    - "Apache Camel"
    - "Apache CXF"
    - "Apache Shiro"
    - "Apache OFBiz"
    - "Apache Geronimo"
    # Other Java application servers / servlet containers
    - "JBoss"
    - "WildFly"
    - "GlassFish"
    - "WebLogic"
    - "WebSphere"
    - "Jetty"
    - "Undertow"
    - "Payara"
    # Non-Java web servers sometimes confused
    - "Nginx"
    - "IIS"
    - "LiteSpeed"
    # Build / dependency tools
    - "Maven"
    - "Gradle"

  # Hardening knobs – require explicit Tomcat match in description and CPE.
  # "tomcat" is specific enough that strict matching works well.
  strict_target_matching: true
  require_project_cpe_match: false
  project_cpe_aliases:
    - "tomcat"
    - "apache:tomcat"

  # Optionally enrich each CVE with CVE.org data (slower).
  enrich_with_cve_org: false
  cve_org_delay: 1.0             # Seconds between CVE.org requests

  # Exclude CVEs published before this year.
  # Tomcat's earliest CVEs in NVD date back to ~2005.
  min_published_year: 2005

# ---------------------------------------------------------------------------
# Module 2: Commit Discovery
# ---------------------------------------------------------------------------
commit_discovery:
  # Remote URL of the source repository (will be cloned if not present).
  # The official ASF mirror on GitHub is a lightweight, fast-to-clone option.
  repo_url: "https://github.com/apache/tomcat.git"

  # Local path to the cloned repository (relative to CWD or absolute).
  repo_local_path: "./tomcat"

  # Timeout (seconds) for the initial git clone.
  # Tomcat repo is ~350 MB — 600 s (10 min) is generous.
  clone_timeout: 600

  # Pull latest changes before searching?
  auto_update: true

  # Additional git-grep patterns to try when searching for fix commits.
  # Tomcat commits often reference Bugzilla bug IDs with "BZ" prefixes.
  extra_grep_patterns: []

  # Optional safety knobs for commit matching:
  # - enable_bz_fallback: tries bug-tracker numeric matching
  #   (Tomcat Bugzilla IDs are fairly unique, so this is useful)
  # - allow_unscoped_extra_patterns: if false, plain patterns without
  #   {cve}/{cve_num} are ignored
  enable_bz_fallback: true
  allow_unscoped_extra_patterns: false

  # File extensions considered as "source code" for content extraction.
  # Tomcat is primarily Java with some JSP and XML configuration.
  source_extensions:
    - ".java"
    - ".jsp"
    - ".xml"

# ---------------------------------------------------------------------------
# Module 3: PoC Mapping & Extraction (ExploitDB)
# ---------------------------------------------------------------------------
poc_mapper:
  # Local path to the ExploitDB git repository.
  # Points to the shared clone at the pipeline root (two levels up from
  # the per-project working directory projects/<name>/).
  exploitdb_path: "../../exploit-database"

  # Remote URL (for auto-clone)
  exploitdb_remote_url: "https://gitlab.com/exploit-database/exploitdb.git"

  # Pull latest ExploitDB data before mapping?
  auto_update: true

  # Deep search: grep exploit file *contents* for CVE IDs (slower but thorough).
  # Tomcat exploits in ExploitDB often reference CVEs in comments/headers.
  deep_search: true

  # Extract full source code from matched exploit files?
  extract_content: true

  # Reverse search: scan ExploitDB titles/contents for your project's
  # keywords to discover CVEs not returned by NVD keyword search.
  reverse_search: true
  enable_reverse_content_grep: true

  # Only include verified exploits from ExploitDB?
  # Tomcat has a moderate number of PoCs; verified-only keeps quality high.
  require_verified: true

  # Indicators that an exploit mentioning "Tomcat" is actually about
  # something else.
  non_target_indicators:
    - "JBoss"
    - "GlassFish"
    - "WebLogic"
    - "WebSphere"
    - "Jetty"

# ---------------------------------------------------------------------------
# Module 4: Data Aggregator
# ---------------------------------------------------------------------------
data_aggregator:
  # Path to the global (all-CVEs) JSON dataset
  global_json_path: "results/tomcat_cve_poc_map.json"

  # When true, remove CVEs from the persisted dataset that are not present
  # in the current run's raw_cves set.
  prune_missing_cves: true

# ---------------------------------------------------------------------------
# Module 5: Syntax Validation
# ---------------------------------------------------------------------------
syntax_validator:
  # Directory where invalid PoC files are copied for manual review
  manual_supervision_dir: "manual_supervision"

  # Path for the JSON validation report
  report_path: "results/tomcat_syntax_validation_report.json"

  # When false, only PoCs belonging to CVEs that have an associated fix
  # commit are flagged for manual review (avoids reviewing unreachable PoCs).
  allow_manual_without_commit: false

# ---------------------------------------------------------------------------
# Module 6: LLM PoC Repair
# ---------------------------------------------------------------------------
poc_repair:
  # Backend provider: "ollama" or "openai"
  provider: "openai"

  # -- OpenAI settings (used only when provider: "openai") --
  openai_model: "gpt-4.1-mini"
  openai_api_key: ""

  # -- Ollama settings (used only when provider: "ollama") --
  api_endpoint: "http://10.3.2.171:80/api/chat"
  model: "devstral:32k"

  # Maximum number of repair attempts per PoC before flagging for manual review
  max_repair_attempts: 3

  # Timeout for each LLM API call (seconds).
  api_timeout: 600

  # Max seconds to wait for model load into GPU VRAM.
  model_load_timeout: 300

  # Ollama context window size (options.num_ctx).
  num_ctx: 32768

  # Maximum characters of PoC source code included in the prompt.
  # 0 = no truncation.
  max_poc_chars: 0

  # Sampling temperature for the LLM.
  temperature: 0.4

  # Output paths
  report_path: "results/tomcat_poc_repair_report.json"
  manual_review_queue_path: "results/tomcat_manual_review_queue.json"

  # GPU availability wait timeout (seconds).
  gpu_wait_timeout: 120

# ---------------------------------------------------------------------------
# Module 7: Output Generation
# ---------------------------------------------------------------------------
output:
  # JSON output paths
  global_json_path: "results/tomcat_cve_poc_map.json"
  filtered_json_path: "results/tomcat_cve_poc_map_filtered.json"

  # CSV output
  csv_path: "results/tomcat_cve_poc_complete.csv"

  # Directory for saving individual PoC exploit files
  poc_dir: "exploits"

  # Filter controls for the "filtered" dataset:
  # - filtered_require_commit: keep only CVEs with discovered fix commits
  # - filtered_require_poc: keep only CVEs with at least one mapped PoC
  # - filtered_require_verified_poc: require at least one PoC flagged as
  #   verified in ExploitDB
  filtered_require_commit: false
  filtered_require_poc: true
  filtered_require_verified_poc: true

  # Export PoC rows/files even when commit discovery failed.
  allow_poc_without_commit: false

  # CSV column names (order matters)
  csv_fields:
    - "CVE"
    - "V_COMMIT"
    - "FilePath"
    - "F_NAME"
    - "UNIT_TYPE"
    - "V_FILE"
    - "V_FUNCTION"
    - "CVE_Description"
    - "CWE"
    - "CWE_Description"
    - "project_version"
    - "project_version_normalized"
    - "ubuntu_version"
    - "poc_index"
    - "poc_path"
    - "poc_language"
    - "manual_review_required"
    - "manual_verified"

# ---------------------------------------------------------------------------
# Phase 1 (orchestrator.py) – project-specific settings
# ---------------------------------------------------------------------------
phase1:
  # Local path to the project source repository (relative to pipeline base_dir)
  project_repo_local_path: "tomcat"

  # Remote URL used to clone the repo when it is absent locally
  project_repo_remote_url: "https://github.com/apache/tomcat.git"

  # Docker image tag prefixes
  docker_base_image_prefix: "ai-ssd/tomcat-base"
  docker_cve_image_prefix: "ai-ssd/tomcat-cve"

  # Path (relative to base_dir) where the image manifest JSON is written
  image_manifest_path: "results/tomcat_image_manifest.json"

  # Build system used inside the Docker container.
  # Tomcat uses Apache Ant (build.xml) as its primary build system.
  # "custom" is appropriate — Phase 1 copies sources and relies on
  # custom build commands (ant deploy / ant dist).
  build_system: "custom"

  # configure flags (not used for custom build system, kept empty)
  extra_configure_flags: []

  # Install prefix inside the container for the compiled project artefacts.
  install_prefix: "/opt/project-build"

  # Name of the source directory inside the Docker build context.
  source_dir_name: "project-src"

  # Name of the build directory inside the Docker build context.
  build_dir_name: "project-build"

  # Commit-year → Ubuntu-version mapping for toolchain (JDK) compatibility.
  # Tomcat version eras roughly align with JDK requirements:
  #   Tomcat 6.x (2007-2016) → JDK 5/6 → Ubuntu 14.04 (OpenJDK 7)
  #   Tomcat 7.x (2011-2021) → JDK 6/7 → Ubuntu 16.04 (OpenJDK 8)
  #   Tomcat 8.x (2014-2024) → JDK 7/8 → Ubuntu 18.04 (OpenJDK 11)
  #   Tomcat 9.x (2018-…)    → JDK 8+  → Ubuntu 20.04 (OpenJDK 11)
  #   Tomcat 10.x (2021-…)   → JDK 11+ → Ubuntu 22.04 (OpenJDK 17)
  #   Tomcat 11.x (2024-…)   → JDK 17+ → Ubuntu 24.04 (OpenJDK 21)
  commit_era_map:
    2005: "14.04"
    2006: "14.04"
    2007: "14.04"
    2008: "14.04"
    2009: "14.04"
    2010: "14.04"
    2011: "14.04"
    2012: "14.04"
    2013: "14.04"
    2014: "16.04"
    2015: "16.04"
    2016: "16.04"
    2017: "18.04"
    2018: "18.04"
    2019: "20.04"
    2020: "20.04"
    2021: "22.04"
    2022: "22.04"
    2023: "24.04"
    2024: "24.04"
    2025: "24.04"
    2026: "24.04"
