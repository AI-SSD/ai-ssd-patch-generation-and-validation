# =============================================================================
# CVE Aggregator Pipeline – glibc Configuration
# =============================================================================

project:
  name: "glibc"
  display_name: "GNU C Library"
  description: "CVE and PoC dataset for GNU C Library (glibc)"

pipeline:
  abort_on_error: false    # Continue even if one module fails

logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  file: "logs/glibc_cve_aggregator.log"

# ---------------------------------------------------------------------------
# CVE Fetching & Enrichment
# ---------------------------------------------------------------------------
cve_fetcher:
  nvd_api_key: "043bad81-616b-445a-8e79-96e87cc96c66"

  keywords:
    - "glibc"
    - "GNU C Library"
    - "eglibc"

  strong_keywords:
    - "glibc"
    - "GNU C Library"
    - "GNU libc"
    - "eglibc"

  non_target_indicators:
    # BSD variants
    - "NetBSD"
    - "FreeBSD"
    - "OpenBSD"
    - "DragonflyBSD"
    # Apple / macOS
    - "Mac OS X"
    - "macOS"
    - "Apple"
    # Commercial Unix
    - "Solaris"
    - "SunOS"
    - "AIX"
    - "HP-UX"
    - "IRIX"
    # Alternative C libraries
    - "musl"
    - "dietlibc"
    - "uClibc"
    - "Bionic"
    # Pre-glibc Linux C library
    - "libc 5."
    - "libc5"
    # False-positive library names
    - "libcgi"
    - "libcrypt"
    - "libcurl"
    - "libcap"

  enrich_with_cve_org: false
  cve_org_delay: 1.0

# ---------------------------------------------------------------------------
# Commit Discovery (glibc mirror)
# ---------------------------------------------------------------------------
commit_discovery:
  repo_url: "https://github.com/bminor/glibc.git"
  repo_local_path: "./glibc"
  auto_update: true
  extra_grep_patterns:
    - "BZ#"
    - "Bug "
  source_extensions:
    - ".c"
    - ".h"

# ---------------------------------------------------------------------------
# PoC Mapping & Extraction (ExploitDB)
# ---------------------------------------------------------------------------
poc_mapper:
  exploitdb_path: "./exploit-database"
  exploitdb_remote_url: "https://gitlab.com/exploit-database/exploitdb.git"
  auto_update: true
  deep_search: false
  extract_content: true
  reverse_search: true
  require_verified: true
  non_target_indicators:
    - "NetBSD"
    - "FreeBSD"
    - "musl"

# ---------------------------------------------------------------------------
# Data Aggregator
# ---------------------------------------------------------------------------
data_aggregator:
  global_json_path: "glibc_cve_poc_map.json"

# ---------------------------------------------------------------------------
# Syntax Validation
# ---------------------------------------------------------------------------
syntax_validator:
  manual_supervision_dir: "manual_supervision"
  report_path: "syntax_validation_report.json"

# ---------------------------------------------------------------------------
# Output Generation
# ---------------------------------------------------------------------------
output:
  global_json_path: "glibc_cve_poc_map.json"
  filtered_json_path: "glibc_cve_poc_map_filtered.json"
  csv_path: "glibc_cve_poc_complete.csv"
  poc_dir: "exploits"
  csv_fields:
    - "CVE"
    - "V_COMMIT"
    - "FilePath"
    - "F_NAME"
    - "UNIT_TYPE"
    - "V_FILE"
    - "V_FUNCTION"
    - "CVE_Description"
    - "CWE"
    - "CWE_Description"
    - "project_version"
    - "ubuntu_version"
    - "poc_path"
    - "poc_language"
    - "manual_review_required"
    - "manual_verified"
